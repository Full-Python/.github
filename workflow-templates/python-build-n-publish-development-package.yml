# This workflow builds and uploads development python artifacts

name: Build and Publish Python Development Package
on:
  push:
    branches:
      - master

jobs:
  load-constants:
    uses: Full-Python/.github/.github/workflows/python-environment-development.yml@master

  cache-workspace:
    needs: load-constants
    uses: Full-Python/.github/.github/workflows/python-cache-workspace.yml@master
    with:
      python-version: ${{ needs.load-constants.outputs.env.PYTHON_VERSION }}

  get-tag:
    needs: [cache-workspace, load-constants]
    uses: Full-Python/.github/.github/workflows/python-package-get-tag.yml@master
    with:
      source-hash: ${{ needs.cache-workspace.outputs.cache-hash }}
      package-name: ${{ vars.PACKAGE_NAME }}
      tag-regex: ${{ needs.load-constants.outputs.env.TAG_REGEX }}
      workflow: ${{ github.workflow }}
    secrets:
      github-token: ${{ secrets.github-token }}

  build-package:
    needs: [get-tag, cache-workspace]
    uses: Full-Python/.github/.github/workflows/python-package-build.yml@master
    with:
      source-hash: ${{ needs.cache-workspace.outputs.cache-hash }}
      workflow: ${{ github.workflow }}
    secrets:
      github-token: ${{ secrets.github-token }}

  github-release:
    needs: [build-package, get-tag, cache-workspace]
    uses: Full-Python/.github/.github/workflows/python-github-release.yml@master
    with:
      source-hash: ${{ needs.cache-workspace.outputs.cache-hash }}
      stable-version: false
      tag-name: ${{ needs.get-tag.outputs.git-tag }}
    secrets:
      github-token: ${{ secrets.github-token }}

  pypi-publication:
    needs: [build-package, cache-workspace]
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Restore Workspace
        uses: actions/cache/restore@v5
        with:
          key: build-${{ needs.cache-workspace.outputs.cache-hash }}
          path: ./

      - name: Publish package distributions to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
