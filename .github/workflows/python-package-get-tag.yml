name: Create Git Tag w/o Release
on:
  workflow_call:
    inputs:
      source-hash:
        required: true
        type: string
      package-name:
        required: true
        type: string
      tag-regex:
        required: true
        type: string
      workflow:
        required: true
        type: string
    outputs:
      git-tag:
        description: "Git tag with the version of the package"
        value: ${{ jobs.get-tag.outputs.git-tag }}
    secrets:
      GITHUB_TOKEN:
        required: true

env:
  STATUS_VALID_VERSION: Valid Version
  STATUS_NONEXISTENT_RELEASE: Nonexistent Release

jobs:
  get-tag:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      id-token: write
    steps:
      - name: Restore Workspace
        uses: actions/cache/restore@v5
        with:
          key: source-${{ inputs.source-hash }}
          path: ./

      - name: Get Python Package Version
        id: get-package-version
        run: |
          echo "PACKAGE_VERSION=v"`./venv/bin/python -m ${{ inputs.package-name }} --version` >> $GITHUB_OUTPUT
          cat $GITHUB_OUTPUT

      - name: Check if Tag is Valid
        id: check-tag
        run: |
          if [[ ! ${{ steps.get-package-version.outputs.PACKAGE_VERSION }} =~ ${{ inputs.tag-regex }} ]]; then
            echo "Version found: ${{ steps.get-package-version.outputs.PACKAGE_VERSION }} is not a valid value for this environment"
            else 
            echo "Version found: ${{ steps.get-package-version.outputs.PACKAGE_VERSION }} is a valid value for this environment"
            echo "VALID_VERSION=true" >> $GITHUB_OUTPUT
          fi

      - name: Set Failure Status for Invalid Version
        if: steps.check-tag.outputs.VALID_VERSION != 'true'
        uses: Full-Python/github-action-set-commit-status@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          status: "error"
          description: ${{ env.STATUS_VALID_VERSION}}
          context: ${{ inputs.workflow }}

      - name: Exit if Invalid Version
        if: steps.check-tag.outputs.VALID_VERSION != 'true'
        run: exit 1

      - name: Set Status for Valid Version
        uses: Full-Python/github-action-set-commit-status@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          status: "success"
          description: ${{ env.STATUS_VALID_VERSION }}
          context: ${{ inputs.workflow }}

      - name: Create Tag
        id: create-tag
        continue-on-error: true
        env:
          TAG: ${{ steps.get-package-version.outputs.PACKAGE_VERSION  }}
        run: |
          git tag ${{ env.TAG }}
          git push origin ${{ env.TAG }}

      - name: Get Release for Tag
        id: get-release
        uses: Full-Python/github-action-get-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: ${{ steps.get-package-version.outputs.PACKAGE_VERSION }}
          doNotFailIfNotFound: true

      - name: Set Failure Status for Nonexisting Release
        if: steps.get-release.outputs.id != null
        uses: Full-Python/github-action-set-commit-status@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          status: "failure"
          description: ${{ env.STATUS_NONEXISTENT_RELEASE }}
          context: ${{ inputs.workflow }}

      - name: Exit if Release Exists
        if: steps.get-release.outputs.id != null
        run: exit 1

      - name: Set Status for Nonexisting Release
        uses: Full-Python/github-action-set-commit-status@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          status: "success"
          description: ${{ env.STATUS_NONEXISTENT_RELEASE }}
          context: ${{ inputs.workflow }}

    outputs:
      git-tag: ${{ steps.get-package-version.outputs.PACKAGE_VERSION }}
