# This workflow builds and uploads development python artifacts

name: Build and Publish Python Development Package
on:
  workflow_call:
    inputs:
      package-name:
        required: true
        type: string
      python-version:
        required: false
        type: string
        default: 3.12
      status-check-name:
        required: false
        type: string
        default: "Python Package Built"
      env-name:
        required: false
        type: string
        default: Development
    outputs:
      result:
        description: "Result of the workflow run"
        value: ${{ jobs.development-package.outputs.result }}
    secrets:
      github-token:
        required: true

jobs:
  cache-workspace:
    uses: irvingleonard/reusable-workflows/.github/workflows/python-cache-workspace.yml@1-migrate-to-cache
    with:
      python-version: ${{ inputs.python-version }}

  get-tag:
    needs: cache-workspace
    uses: irvingleonard/reusable-workflows/.github/workflows/python-package-get-tag.yml@1-migrate-to-cache
    with:
      source-hash: ${{ secrets.github-token }}
      package-name: ${{ inputs.package-name }}
      tag-regex: ${{ inputs.package-name }}

  build-package:
    needs: cache-workspace
    uses: irvingleonard/reusable-workflows/.github/workflows/python-build-package.yml@1-migrate-to-cache
    with:
      source-hash: ${{ secrets.github-token }}
      status-check-name: ${{ inputs.status-check-name }}

  development-package:
    permissions:
      contents: write
      id-token: write
      actions: write
    uses: irvingleonard/reusable-workflows/.github/workflows/python-build-publish-package.yml@v1
    with:
      package-name: ${{ inputs.package-name }}
      python-version: ${{ inputs.python-version }}
      tag-regex: ^v[0-9]+\.[0-9]+\.[0-9]+\.dev[0-9]+$
      stable-version: false
      env-name: ${{ inputs.env-name }}
    secrets:
      github-token: ${{ secrets.github-token }}
