# Workflow to validate python packages

name: Validate Python Package
on:
  workflow_call:
    inputs:
      source-hash:
        required: true
        type: string
      workflow:
        required: true
        type: string


      package-name:
        required: true
        type: string
      python-version:
        required: false
        type: string
        default: 3.12
    secrets:
      github-token:
        required: true

env:
  STATUS_TESTS_PASSED: Tests Passed
  STATUS_COVERAGE_ACHIEVED: Coverage Achieved

jobs:
  run-tests:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      statuses: write
    steps:
      - name: Restore Workspace
        uses: actions/cache/restore@v5
        with:
          key: source-${{ inputs.source-hash }}
          path: ./

      - name: Install Test Coverage Python Modules
        run: |
          ./venv/bin/pip install --upgrade coverage

      - name: Run Tests
        id: tests
        run: ./venv/bin/coverage run -m unittest discover -v -s ${{ vars.TESTS_FOLDER || 'tests' }} && echo "TESTS_RESULT=passing" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Tests Failed
        if: steps.tests.outputs.TESTS_RESULT != 'passing'
        uses: Full-Python/github-action-set-commit-status@v2.0.1
        with:
          token: ${{ secrets.github-token }}
          status: "failure"
          description: ${{ env.STATUS_VALID_VERSION}}
          context: ${{ inputs.workflow }}

      - name: Exit if Tests Failed
        if: steps.tests.outputs.TESTS_RESULT != 'passing'
        run: exit 1

      - name: Create success status
        uses: irvingleonard/github-actions-set-commit-status@master
        with:
          token: ${{ secrets.github-token }}
          status: "success"
          context: ${{ env.STATUS_CHECK_NAME }}
